<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DAG 编辑器</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar">
        <h1>DAG 编辑器</h1>
        <button id="newCanvasBtn">新建画布</button>
        <div id="canvasList" class="canvas-list"></div>
        <hr />
        <button id="addNodeBtn">新增节点</button>
        <div class="search-box">
          <input id="nodeSearchInput" type="text" placeholder="搜索节点ID/名称/属性" />
          <button id="searchNodeBtn" class="secondary">定位节点</button>
        </div>
        <button id="deleteEdgeBtn" class="danger" disabled>删除选中边</button>
        <button id="exportBtn">导出 JSON</button>
        <button id="importBtn">导入 JSON</button>
        <input id="importInput" type="file" accept="application/json" class="hidden-file" />
        <p class="tips">
          使用方式：<br />
          1) 点击“新增节点”创建节点；<br />
          2) 拖动节点可移动位置；<br />
          3) 从节点右侧圆点拖拽到另一个节点可创建边；<br />
          4) 点击边可高亮并删除；<br />
          5) 可通过搜索框快速定位节点；<br />
          6) 拖动画布空白区域可平移视图；<br />
          7) 点击节点可编辑属性。
        </p>
      </aside>

      <main class="main">
        <div id="viewport" class="viewport">
          <svg id="edgeLayer" class="edge-layer"></svg>
          <div id="canvas" class="canvas"></div>
        </div>
        <div id="propertyPanel" class="property-panel hidden">
          <h3>节点属性</h3>
          <label>
            节点 ID
            <input id="nodeIdInput" type="text" />
          </label>
          <label>
            名称
            <input id="nodeLabelInput" type="text" />
          </label>
          <label>
            颜色
            <input id="nodeColorInput" type="color" />
          </label>
          <label>
            自定义属性
            <div id="metaRows" class="meta-rows"></div>
            <button id="addMetaRowBtn" type="button" class="secondary">+ 新增属性</button>
          </label>
          <button id="saveNodeBtn">保存节点</button>
          <button id="deleteNodeBtn" class="danger">删除节点</button>
        </div>
        <div id="edgePropertyPanel" class="property-panel hidden">
          <h3>边属性</h3>
          <label>
            边 ID
            <input id="edgeIdDisplay" type="text" readonly />
          </label>
          <label>
            起点节点
            <select id="edgeFromSelect"></select>
          </label>
          <label>
            终点节点
            <select id="edgeToSelect"></select>
          </label>
          <button id="saveEdgeBtn">保存边</button>
          <button id="deleteEdgePanelBtn" class="danger">删除边</button>
        </div>
      </main>
    </div>

    <script src="app.js"></script>
  </body>
</html>
